<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Merger</title>
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(165deg, #0f0f12 0%, #1a1a2e 40%, #16213e 100%);
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #e0e0e0;
    padding: 2rem;
  }

  .container { max-width: 720px; margin: 0 auto; }

  h1 {
    font-size: 2rem;
    font-weight: 700;
    text-align: center;
    background: linear-gradient(135deg, #ff6b6b, #ffa66b, #ffd93d);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }

  .subtitle {
    text-align: center;
    color: #888;
    margin: 0.4rem 0 2rem;
    font-size: 0.9rem;
  }

  .dropzone {
    border: 2px dashed #333;
    border-radius: 16px;
    padding: 2.5rem 1.5rem;
    text-align: center;
    cursor: pointer;
    background: rgba(255,255,255,0.02);
    transition: all 0.25s ease;
    margin-bottom: 1.5rem;
  }

  .dropzone.drag-over {
    border-color: #ffa66b;
    background: rgba(255, 166, 107, 0.06);
  }

  .dropzone .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
  .dropzone p { color: #aaa; font-size: 1rem; }
  .dropzone .browse { color: #ffa66b; text-decoration: underline; }
  .dropzone .hint { color: #666; font-size: 0.78rem; margin-top: 0.3rem; }

  .log-panel {
    background: rgba(255,255,255,0.03);
    border: 1px solid #2a2a3a;
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 1.5rem;
    display: none;
  }

  .log-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.75rem 1.2rem;
    border-bottom: 1px solid #2a2a3a;
    background: rgba(255,255,255,0.02);
  }

  .log-header span {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #777;
    font-weight: 600;
  }

  .btn-clear {
    background: none;
    border: 1px solid #444;
    color: #999;
    font-size: 0.72rem;
    padding: 3px 10px;
    border-radius: 6px;
    cursor: pointer;
  }

  .table-header {
    display: grid;
    grid-template-columns: 40px 1fr 80px 100px 40px;
    gap: 0.5rem;
    padding: 0.5rem 1.2rem;
    font-size: 0.68rem;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
    border-bottom: 1px solid #222;
  }

  .file-list { max-height: 320px; overflow-y: auto; }

  .file-row {
    display: grid;
    grid-template-columns: 40px 1fr 80px 100px 40px;
    gap: 0.5rem;
    align-items: center;
    padding: 0.65rem 1.2rem;
    border-bottom: 1px solid #1a1a2a;
    font-size: 0.82rem;
    transition: background 0.15s;
  }

  .file-row:hover { background: rgba(255,166,107,0.04); }

  .file-row .order {
    color: #ffa66b;
    font-weight: 700;
    font-size: 0.75rem;
    font-family: monospace;
  }

  .file-row .name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: #ccc;
  }

  .file-row .size { color: #777; font-size: 0.78rem; }

  .file-row .time {
    color: #666;
    font-size: 0.73rem;
    font-family: monospace;
  }

  .btn-remove {
    background: none;
    border: none;
    color: #555;
    cursor: pointer;
    font-size: 1rem;
    padding: 0;
    line-height: 1;
  }

  .btn-remove:hover { color: #ff6b6b; }

  .btn-merge {
    width: 100%;
    padding: 0.9rem;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    background: linear-gradient(135deg, #ff6b6b, #ffa66b);
    color: #fff;
    letter-spacing: 0.3px;
    transition: all 0.3s ease;
    box-shadow: 0 4px 20px rgba(255,107,107,0.25);
    display: none;
  }

  .btn-merge:disabled { opacity: 0.7; cursor: wait; }

  .btn-merge.success {
    background: linear-gradient(135deg, #2ecc71, #27ae60);
    box-shadow: 0 4px 20px rgba(46,204,113,0.3);
  }

  .msg-need-more {
    text-align: center;
    color: #666;
    font-size: 0.85rem;
    margin-top: 0.5rem;
    display: none;
  }
</style>
</head>
<body>

<div class="container">
  <h1>PDF Merger</h1>
  <p class="subtitle">Upload PDFs · They merge in upload order</p>

  <div class="dropzone" id="dropzone">
    <div class="icon">📄</div>
    <p>Drag & drop PDF files here, or <span class="browse">browse</span></p>
    <p class="hint">Only .pdf files accepted</p>
    <input type="file" id="fileInput" accept=".pdf,application/pdf" multiple hidden>
  </div>

  <div class="log-panel" id="logPanel">
    <div class="log-header">
      <span id="fileCount">Upload Log (0 files)</span>
      <button class="btn-clear" id="btnClear">Clear All</button>
    </div>
    <div class="table-header">
      <span>#</span><span>File Name</span><span>Size</span><span>Uploaded</span><span></span>
    </div>
    <div class="file-list" id="fileList"></div>
  </div>

  <button class="btn-merge" id="btnMerge"></button>
  <p class="msg-need-more" id="msgNeedMore">Add at least one more PDF to merge.</p>
</div>

<script>
  const files = [];
  let counter = 0;

  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const logPanel = document.getElementById('logPanel');
  const fileCount = document.getElementById('fileCount');
  const fileList = document.getElementById('fileList');
  const btnClear = document.getElementById('btnClear');
  const btnMerge = document.getElementById('btnMerge');
  const msgNeedMore = document.getElementById('msgNeedMore');

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(2) + ' MB';
  }

  function formatTime(date) {
    return date.toLocaleTimeString('en-US', {
      hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
    });
  }

  function updateUI() {
    logPanel.style.display = files.length > 0 ? 'block' : 'none';
    fileCount.textContent = `Upload Log (${files.length} file${files.length !== 1 ? 's' : ''})`;
    btnMerge.style.display = files.length >= 2 ? 'block' : 'none';
    btnMerge.textContent = `Merge ${files.length} PDFs in Upload Order`;
    btnMerge.classList.remove('success');
    msgNeedMore.style.display = files.length === 1 ? 'block' : 'none';
  }

  function renderFiles() {
    fileList.innerHTML = '';
    files.forEach((entry, i) => {
      const row = document.createElement('div');
      row.className = 'file-row';
      row.innerHTML = `
        <span class="order">${String(i + 1).padStart(2, '0')}</span>
        <span class="name" title="${entry.name}">${entry.name}</span>
        <span class="size">${formatSize(entry.size)}</span>
        <span class="time">${formatTime(entry.uploadedAt)}</span>
        <button class="btn-remove" title="Remove" data-id="${entry.id}">&times;</button>
      `;
      fileList.appendChild(row);
    });
    updateUI();
  }

  function addFiles(newFiles) {
    const pdfFiles = Array.from(newFiles).filter(f => f.type === 'application/pdf' || f.name.toLowerCase().endsWith('.pdf'));
    if (pdfFiles.length === 0) {
      alert('Please select PDF files only.');
      return;
    }
    pdfFiles.forEach(file => {
      files.push({
        id: ++counter,
        file,
        name: file.name,
        size: file.size,
        uploadedAt: new Date(),
      });
    });
    renderFiles();
  }

  // Drag & drop
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault();
    dropzone.classList.remove('drag-over');
    addFiles(e.dataTransfer.files);
  });

  // Click to browse
  dropzone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => {
    addFiles(e.target.files);
    e.target.value = '';
  });

  // Remove single file
  fileList.addEventListener('click', e => {
    if (e.target.classList.contains('btn-remove')) {
      const id = parseInt(e.target.dataset.id);
      const idx = files.findIndex(f => f.id === id);
      if (idx !== -1) files.splice(idx, 1);
      renderFiles();
    }
  });

  // Clear all
  btnClear.addEventListener('click', () => {
    files.length = 0;
    counter = 0;
    renderFiles();
  });

  // Merge
  btnMerge.addEventListener('click', async () => {
    if (files.length < 2) return;
    btnMerge.disabled = true;
    btnMerge.textContent = 'Merging...';

    try {
      const { PDFDocument } = PDFLib;
      const mergedPdf = await PDFDocument.create();

      for (const entry of files) {
        const arrayBuffer = await entry.file.arrayBuffer();
        const pdf = await PDFDocument.load(arrayBuffer);
        const pages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
        pages.forEach(page => mergedPdf.addPage(page));
      }

      const mergedBytes = await mergedPdf.save();
      const blob = new Blob([mergedBytes], { type: 'application/pdf' });
      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      a.download = 'merged_output.pdf';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      btnMerge.classList.add('success');
      btnMerge.textContent = '✓ Merged & Downloaded!';
    } catch (err) {
      console.error('Merge failed:', err);
      alert('Error merging PDFs. Make sure all files are valid PDFs.');
      btnMerge.textContent = `Merge ${files.length} PDFs in Upload Order`;
    } finally {
      btnMerge.disabled = false;
    }
  });
</script>

</body>
</html>
